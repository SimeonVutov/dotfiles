### --- Prefix (use Ctrl + a) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

### --- General Quality of Life Settings ---
set -g mouse on
set -g history-limit 10000          # Large scrollback
set -g base-index 1                 # Windows start at 1
setw -g pane-base-index 1           # Panes start at 1
set -g renumber-windows on          # Reorder window numbers after closing
set -g allow-rename off             # Don't auto-rename windows

# Allow tmux to pass clipboard to system
set-option -g set-clipboard on

### --- Reload Config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

### --- Visual Interface (Kitty Transparent Fix) ---
# 1. Correct Terminal Type
set -g default-terminal "tmux-256color"

# 2. Tell Tmux that 'xterm-kitty' supports TrueColor (RGB)
set -ag terminal-overrides ",xterm-kitty:RGB"

set-option -g status-position top
set -g status-justify left
set -g status-style "bg=default fg=white"
set -g status-left-style "bg=default"
set -g status-right-style "bg=default"
set -g message-style "bg=default fg=white"

# 5. Content Configuration
set -g status-left-length 50
set -g status-right-length 80

# Show session name on left
set -g status-left " #[bold]#S "

# Window list formatting
setw -g window-status-format " #[fg=colour244]#I:#W "
setw -g window-status-current-format " #[fg=green,bold][#I:#W] "

# Show current path on the right
set -g status-right " #[fg=cyan]#{pane_current_path} "

### --- Splits ---
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

### --- Navigation (Vim-Tmux-Navigator) ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'n?vim'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Optional: Restore C-l clearing screen behavior if not in Vim
bind C-l send-keys 'C-l'

### --- Resize Panes (Standard Tmux) ---
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

### --- Copy Mode (Vim-style) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection

### --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'                 # Plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'       # Good defaults
set -g @plugin 'tmux-plugins/tmux-yank'           # Yank to clipboard
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Show prefix press
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save sessions
set -g @plugin 'sainnhe/tmux-fzf'                 # FZF fuzzy switching

### --- Resurrect & Continuum Behavior ---
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

### --- Explicit Pro FZF Keybindings ---
bind f run-shell "~/.tmux/plugins/tmux-fzf/main.sh"
bind s run-shell "~/.tmux/plugins/tmux-fzf/main.sh session"
bind w run-shell "~/.tmux/plugins/tmux-fzf/main.sh window"
bind p run-shell "~/.tmux/plugins/tmux-fzf/main.sh pane"

### --- Set plugin install directory ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

### --- Manual settings ---
set -g update-environment "DISPLAY WAYLAND_DISPLAY XAUTHORITY XDG_RUNTIME_DIR"
set-environment -g DISPLAY $DISPLAY

### --- Initialize TPM (MUST be last!) ---
run '~/.tmux/plugins/tpm/tpm'
