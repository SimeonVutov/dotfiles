source = ~/.cache/matugen/colors-hyprlock.conf
$WidgetScript = ~/.config/scripts/hyprland/hyprlock-music.sh
$WidgetArt = ~/.cache/hyprlock-art/music-widget.jpg

# BACKGROUND
background {
    monitor =
    path = ~/.cache/blurred_wallpaper.png
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0
}

# GENERAL
general {
}


# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = $text
    font_size = 90
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = $text
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = $text
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 190
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi, $USER
    color = $text
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, 30
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0.0)
    inner_color = $accent
    font_color = $text
    fade_on_empty = true
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">🔒 Enter Pass</span></i>
    hide_input = false
    position = 0, -70
    halign = center
    valign = center
}

# ============================================================================
# Music Player Widget
# ============================================================================

# ============================================================================
# Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Album Art
# ----------------------------------------------------------------------------
image {
    monitor =
    path = $WidgetArt
    size = 100
    rounding = 5
    border_size = 3
    border_color = rgba(216, 222, 233, 0.70)
    reload_time = 1
    reload_cmd = $WidgetScript --art-refresh
    position = -180, 57
    halign = center
    valign = bottom
    zindex = 1
}
# ----------------------------------------------------------------------------
# Player Background Box
# ----------------------------------------------------------------------------
shape {
    monitor =
    color = rgba(100, 114, 125, 0.4)
    size = 500, 140
    rounding = 10
    position = 0, 40
    halign = center
    valign = bottom
    zindex = 0
}

# ----------------------------------------------------------------------------
# Track Information
# ----------------------------------------------------------------------------

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --title
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = SF Pro Display Heavy
    position = 55, 138
    halign = center
    valign = bottom
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --player
    color = rgba(216, 222, 233, 0.70)
    font_size = 13
    font_family = SF Pro Display Bold
    position = 205, 45
    halign = center
    valign = bottom
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --artist-display
    color = rgba(216, 222, 233, 0.70)
    font_size = 12
    font_family = SF Pro Display Semibold
    position = 55, 118
    halign = center
    valign = bottom
    zindex = 1
}

# ----------------------------------------------------------------------------
# Playback Controls
# ----------------------------------------------------------------------------

label {
    monitor =
    text = 󰒮
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    onclick = playerctl previous
    position = -5, 55
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --status
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    onclick = playerctl play-pause
    position = 55, 55
    halign = center
    valign = bottom
}

label {
    monitor =
    text = 󰒭
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    onclick = playerctl next
    position = 110, 55
    halign = center
    valign = bottom
}

# ----------------------------------------------------------------------------
# Progress Display
# ----------------------------------------------------------------------------

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --position
    color = rgba(216, 222, 233, 0.70)
    font_size = 10
    font_family = SF Pro Display Medium
    position = -100, 95
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --length
    color = rgba(216, 222, 233, 0.70)
    font_size = 10
    font_family = SF Pro Display Medium
    position = 210, 95
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] $WidgetScript --progress-bar
    color = rgba(216, 222, 233, 0.70)
    font_size = 12
    font_family = SF Pro Display Medium
    position = 55, 95
    halign = center
    valign = bottom
}

