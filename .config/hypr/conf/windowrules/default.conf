# ----------------------------------------------------- 
# Window rules
# ----------------------------------------------------- 
windowrule = tile on, match:class ^(Firefox)$

windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, pin on, move (monitor_w*0.695) (monitor_h*0.04), match:title ^(Picture-in-Picture)$
windowrule = suppress_event maximize, match:class .*
windowrule = float on, center on, size 900 600, match:title ^(wifi-tui|bluetooth-tui|pulsemixer)$
