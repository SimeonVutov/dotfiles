# ----------------------------------------------------- 
# General window layout and colors
# name: "Default"
# ----------------------------------------------------- 

general {
    gaps_in = 3
    gaps_out = 12
    border_size = 2
    col.active_border   = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}
