name: Copilot PR Summarizer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 
      contents: read       
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate PR Summary
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 1. Start building the prompt file
          cat << 'EOF' > prompt.txt
          You are an expert developer reviewing a Pull Request.
          I will provide you with the current PR description, the commit messages, and the Git diff.
          
          Specifically written description currently:
          """
          EOF
          
          # Append current description safely
          gh pr view $PR_NUMBER --json body -q .body >> prompt.txt
          
          # Append Commit Messages (Last 20)
          echo -e '\n"""\nCommit Messages:\n"""' >> prompt.txt
          gh pr view $PR_NUMBER --json commits --jq '.commits[-20:] | .[] | "- \(.messageHeadline)"' >> prompt.txt
          
          # Append Git Diff Summary
          echo -e '\n"""\nGit Diff Summary:\n"""' >> prompt.txt
          gh pr diff $PR_NUMBER --stat >> prompt.txt
          
          # Append Actual Code Changes (Filtered & Truncated)
          echo -e '\n"""\nActual Code Changes:\n"""' >> prompt.txt
          gh pr diff $PR_NUMBER -- . ':(exclude)*.lock' ':(exclude)*-lock.json' | head -n 400 >> prompt.txt
          
          # Append formatting instructions
          cat << 'EOF' >> prompt.txt
          """
          
          CRITICAL AGENT INSTRUCTIONS:
          1. DO NOT attempt to write to files, execute shell commands, or use any tools.
          2. Output ONLY the raw Markdown text directly in your response. 
          3. Do not include any conversational filler (e.g., "Here is the summary...").
          
          Based on the diff, the commit messages, and the initial description, rewrite the PR description using EXACTLY the following Markdown format. 
          
          STRICT WRITING GUIDELINES:
          - Be extremely concise and direct. 
          - Remove redundant technical descriptors (e.g., write "Hyprland" instead of "Hyprland window manager").
          - Rely heavily on the commit messages to understand the intent behind the changes.
          
          ## 📦 Summary (Short Description)
          [Write a 1-2 sentence high-level summary here followed by bullet points if necessary]
          ---
          ## 🚀 Major Updates (Breaking or high-impact changes)
          [List major changes here. If none, write "None"]
          ---
          ## ✨ Minor Updates (Enhancements or small changes)
          [List minor changes, refactors, or formatting here. If none, write "None"]
          ---
          ## 🐞 Fixes (Bug fixes or corrections)
          [List bugs fixed here based on the diff. If none, write "None"]
          ---
          ## 📁 Additional Notes / Migration Steps (if needed)
          [List any notes here. If none, write "None"]
          EOF
          
          # Send prompt to Copilot CLI (-p for prompt, -s to suppress agent chatter)
          echo "Sending prompt to Copilot..."
          copilot -p "$(cat prompt.txt)" -s > new_description.md
          
          # Update the Pull Request with the AI output
          echo "Updating Pull Request..."
          gh pr edit $PR_NUMBER --body-file new_description.md
